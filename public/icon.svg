<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d3a8c"/>
      <stop offset="50%" stop-color="#4a3f8f"/>
      <stop offset="100%" stop-color="#5b4a9e"/>
    </linearGradient>
    <!-- Gold gradient for text -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#d4982a"/>
    </linearGradient>
    <!-- Shine effect -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Organic colorful shapes (like the album cover) -->
  <!-- Top-left red -->
  <circle cx="95" cy="90" r="75" fill="#d63031" opacity="0.85"/>
  <!-- Top-right green -->
  <circle cx="420" cy="75" r="65" fill="#78b84a" opacity="0.8"/>
  <!-- Mid-left orange -->
  <circle cx="65" cy="280" r="55" fill="#e17055" opacity="0.7"/>
  <!-- Bottom-left teal -->
  <circle cx="120" cy="430" r="70" fill="#4ecbdf" opacity="0.75"/>
  <!-- Bottom-right lime -->
  <circle cx="415" cy="440" r="60" fill="#c4d84a" opacity="0.8"/>
  <!-- Mid-right magenta -->
  <circle cx="440" cy="240" r="50" fill="#c44dbb" opacity="0.7"/>
  <!-- Center-top sky blue -->
  <circle cx="260" cy="60" r="45" fill="#74b9e8" opacity="0.6"/>
  <!-- Bottom-center orange -->
  <circle cx="280" cy="460" r="50" fill="#e17055" opacity="0.6"/>
  <!-- Small accent circles -->
  <circle cx="180" cy="180" r="30" fill="#78b84a" opacity="0.4"/>
  <circle cx="350" cy="150" r="35" fill="#d63031" opacity="0.4"/>
  <circle cx="350" cy="380" r="40" fill="#4a69bd" opacity="0.5"/>

  <!-- Central white glow backdrop -->
  <circle cx="256" cy="256" r="130" fill="white" opacity="0.12"/>

  <!-- "FIG" text top -->
  <text x="256" y="225" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">
    FIG
  </text>

  <!-- "UP" text bottom with gold -->
  <text x="256" y="305" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="82" font-weight="900" fill="url(#gold)" letter-spacing="-3">
    UP
  </text>

  <!-- Small "26" badge bottom-right -->
  <circle cx="370" cy="350" r="36" fill="white"/>
  <text x="370" y="362" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#3d3a8c">
    26
  </text>

  <!-- Sticker icon (top-left decorative) -->
  <rect x="145" y="345" width="50" height="65" rx="6" fill="white" opacity="0.9" transform="rotate(-8, 170, 377)"/>
  <rect x="150" y="350" width="40" height="42" rx="3" fill="#4ecbdf" opacity="0.8" transform="rotate(-8, 170, 371)"/>
  <circle cx="170" cy="400" r="3" fill="#d4982a" transform="rotate(-8, 170, 400)"/>

  <!-- Shine overlay -->
  <rect width="512" height="512" rx="108" fill="url(#shine)" opacity="0.4"/>
</svg>
